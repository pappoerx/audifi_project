<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="staffpage.html">
  <link rel="stylesheet" href="studentpage.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudiFi | Lecturer Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            knustGold: '#ffcc00',
          }
        }
      }
    }
  </script>
  <script>window.AUDIFI_API_BASE = 'http://127.0.0.1:8000';</script>
  <script src="script.js" defer></script>
</head>
<body class="h-screen flex items-center justify-center p-4 bg-[#E8F1F0]">
    
  <div class=" w-full max-w-md p-8 rounded-2xl shadow-xl border-t-8 border-[#14919B] bg-[#E8F1F0]">
    
    <div class="text-center mb-8 bg-[#E8F1F0]">
      <h1 class="text-3xl font-bold text-gray-800">Audi<span class="text-knustGold">Fi</span></h1>
      <p class="text-gray-500 text-sm mt-2">Lecturer Login to Manage Bookings</p>
    </div>

    <form action="#" class="space-y-6 bg-[#E8F1F0]">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Lecturer ID</label>
        <input type="text" placeholder="Enter your Lecturer ID" maxlength="8" id="lecturerId"
               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-knustGold focus:outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input type="password" placeholder='Enter Password' id="lecturerPassword"
               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-knustGold focus:outline-none transition">
      </div>

    <button id="lecturerLoginBtn" type="submit" disabled
        class="w-full bg-knustGold text-black font-bold py-3 rounded-lg opacity-50 cursor-not-allowed transition shadow-md">
        Login as Lecturer
    </button>

      <div class="text-center">
        <a href="#" class="text-xs text-gray-400 hover:text-knustGold transition">Forgot your password?</a>
      </div>
    </form>

  </div>

</body>
</html>
